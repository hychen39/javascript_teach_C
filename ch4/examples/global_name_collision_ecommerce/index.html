<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Name Collision Ecommerce Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 760px;
        margin: 40px auto;
        padding: 0 16px;
        line-height: 1.6;
      }

      .card {
        border: 1px solid #d0d7de;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
        background: #f8fafc;
      }

      .warning {
        color: #b42318;
        font-weight: bold;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        background: #1d4ed8;
        color: white;
        cursor: pointer;
      }

      code {
        background: #e5e7eb;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <h1>Global 命名衝突 Demo</h1>

    <div class="card">
      <p>情境：</p>
      <p>電商商品頁原本用 <code>productName</code> 和 <code>formatPrice()</code> 顯示商品。</p>
      <p>後來又載入一支行銷腳本，也用了相同的全域名稱，結果把原本的值蓋掉。</p>
    </div>

    <div class="card">
      <h2>商品頁結果</h2>
      <div id="product-output"></div>
      <button id="rerender-btn">重新渲染商品卡</button>
      <p class="warning" id="warning-message"></p>
    </div>

    <script src="./storefront.js"></script>
    <script src="./campaign-widget.js"></script>
  </body>
</html>
