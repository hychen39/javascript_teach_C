<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Object Shared Data Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 760px;
        margin: 40px auto;
        padding: 0 16px;
        line-height: 1.6;
      }

      .card {
        border: 1px solid #d0d7de;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
        background: #f8fafc;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        background: #0f766e;
        color: white;
        cursor: pointer;
      }

      code {
        background: #e5e7eb;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <h1>Global Object 共享資料 Demo</h1>

    <div class="card">
      <p>這個例子會依序載入兩個 JS 檔案：</p>
      <ol>
        <li><code>cart-store.js</code> 把購物車資料放到 <code>globalThis</code></li>
        <li><code>cart-page.js</code> 讀取並修改同一份資料</li>
      </ol>
    </div>

    <div class="card">
      <h2>目前購物車</h2>
      <div id="cart-output"></div>
      <button id="add-item-btn">加入一杯 Latte</button>
    </div>

    <script src="./cart-store.js"></script>
    <script src="./cart-page.js"></script>
  </body>
</html>
